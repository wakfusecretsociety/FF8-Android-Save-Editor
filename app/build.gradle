plugins {
    id 'com.android.application'
}

android {
    namespace 'io.github.ff8saveeditor'
    compileSdk 36

    defaultConfig {
        applicationId "io.github.ff8saveeditor"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
